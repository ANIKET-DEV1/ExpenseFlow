<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F7F6F1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1C2620;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #F7F6F1;">
        <tr>
            <td align="center" style="padding: 48px 16px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 560px; background-color: #FFFFFF; border: 1px solid #E4E1D2; border-radius: 6px;">

                    <!-- Wordmark -->
                    <tr>
                        <td style="padding: 32px 40px 24px 40px;">
                            <table border="0" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="width: 34px; padding-right: 10px;">
                                        <div style="width: 32px; height: 32px; border-radius: 50%; background-color: #0F6F4E; color: #FFFFFF; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; font-weight: 700; line-height: 32px; text-align: center;">₹</div>
                                    </td>
                                    <td style="font-family: Georgia, 'Times New Roman', serif; font-size: 17px; font-weight: 700; color: #1C2620; letter-spacing: 0.2px; vertical-align: middle;">Expense Tracker</td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding: 0 40px;">
                            <div style="border-top: 1px solid #ECEAE0;"></div>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 32px 40px 8px 40px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 28px 40px 32px 40px; border-top: 1px solid #ECEAE0;">
                            <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #8C9690;">
                                This is an automated message from Expense Tracker. If you weren't expecting it, you can safely ignore it.<br>
                                © 2026 Expense Tracker
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
