services:
  # 1. FastAPI app
  web:
    build: .
    container_name: expense_backend
    ports:
      - "8080:8080"
    volumes:
      - .:/app
   
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:localpassword@db:5432/expense_db
      - REDIS_URL=redis://redis:6379/0
      - base_url=http://localhost:8080
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    depends_on:
      - db
      - redis

  # 2. Local Postgres Database Instance updated to Postgres 18
  db:
    image: postgres:18-alpine
    container_name: local_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: expense_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql

  # 3.  Local Redis Caching Instance
  redis:
    image: redis:7-alpine
    container_name: local_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data

volumes:
  postgres_local_data:
  redis_local_data: